{% extends "base.html" %}

{% block title %}Profile - Mergado Shopify Import & Sync{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>User Profile</h1>
    
    <div class="card mt-4">
        <div class="card-header">
            <h5 class="mb-0">Account Information</h5>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3">
                    <strong>User ID:</strong>
                </div>
                <div class="col-sm-9" id="user-id">
                    <span class="text-muted">Loading...</span>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-sm-3">
                    <strong>Token Expires:</strong>
                </div>
                <div class="col-sm-9" id="token-expiry">
                    <span class="text-muted">Loading...</span>
                </div>
            </div>
            
            <div class="row">
                <div class="col-sm-3">
                    <strong>Connected:</strong>
                </div>
                <div class="col-sm-9">
                    <span class="badge bg-success">Mergado OAuth Active</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card mt-4">
        <div class="card-header">
            <h5 class="mb-0">Actions</h5>
        </div>
        <div class="card-body">
            <button class="btn btn-warning" onclick="refreshToken()">
                <i class="fas fa-sync"></i> Refresh Token
            </button>
            <button class="btn btn-danger" onclick="signOut()">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </div>
</div>

<script>
// Display token information
function displayProfileInfo() {
    const expiresAt = localStorage.getItem('mergado_expires_at');
    
    if (expiresAt) {
        const expiryDate = new Date(parseFloat(expiresAt) * 1000);
        document.getElementById('token-expiry').innerHTML = 
            `<span>${expiryDate.toLocaleString()}</span>`;
    }
    
    // Note: User ID would come from API call in real implementation
    document.getElementById('user-id').innerHTML = 
        '<span class="text-muted">Available after API integration</span>';
}

function refreshToken() {
    const refreshToken = localStorage.getItem('mergado_refresh_token');
    
    if (!refreshToken) {
        alert('No refresh token available');
        return;
    }
    
    fetch('/auth/refresh-token', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ refresh_token: refreshToken })
    })
    .then(response => response.json())
    .then(data => {
        if (data.access_token) {
            localStorage.setItem('mergado_access_token', data.access_token);
            localStorage.setItem('mergado_expires_at', data.expires_at);
            alert('Token refreshed successfully!');
            displayProfileInfo();
        } else {
            alert('Failed to refresh token');
        }
    })
    .catch(error => {
        console.error('Error refreshing token:', error);
        alert('Error refreshing token');
    });
}

function signOut() {
    localStorage.removeItem('mergado_access_token');
    localStorage.removeItem('mergado_refresh_token');
    localStorage.removeItem('mergado_expires_at');
    window.location.href = '/';
}

// Load profile info when page loads
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', displayProfileInfo);
} else {
    displayProfileInfo();
}
</script>
{% endblock %}
